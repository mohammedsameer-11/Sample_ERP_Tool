<header class="h-16 bg-white border-b border-gray-200 flex items-center px-6 gap-4 shrink-0">

    <!-- Hamburger for mobile / sidebar toggle on desktop -->
    <button (click)="toggleSidebar.emit()" class="p-1.5 rounded-lg text-gray-500 hover:bg-gray-100 transition-colors"
        aria-label="Toggle navigation">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
    </button>

    <!-- Page title derived from current route (would use Router in real app) -->
    <h1 class="text-lg font-semibold text-gray-800 hidden sm:block">
        Enterprise Resource Planning
    </h1>

    <!-- Spacer -->
    <div class="flex-1"></div>

    <!-- Notification bell -->
    <button class="relative p-1.5 rounded-lg text-gray-500 hover:bg-gray-100 transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
        </svg>
        <!-- Notification dot -->
        <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
    </button>

    <!-- User profile -->
    <div class="flex items-center gap-3 pl-4 border-l border-gray-200">
        <div
            class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-white text-sm font-semibold">
            AK
        </div>
        <div class="hidden sm:block">
            <p class="text-sm font-medium text-gray-800 leading-none">Admin Kumar</p>
            <p class="text-xs text-gray-500 mt-0.5">System Administrator</p>
        </div>
    </div>
</header>
