    <div class="flex h-screen bg-gray-50 overflow-hidden">
      <!-- Sidebar: receives collapsed state, emits toggle events -->
      <app-sidebar
        [collapsed]="isSidebarCollapsed()"
        (toggleCollapse)="toggleSidebar()"
      />

      <!-- Main content area — margin adjusts with sidebar -->
      <div
        class="flex flex-col flex-1 overflow-hidden transition-all duration-300"
        [class.ml-64]="!isSidebarCollapsed()"
        [class.ml-16]="isSidebarCollapsed()"
      >
        <app-header
          [sidebarCollapsed]="isSidebarCollapsed()"
          (toggleSidebar)="toggleSidebar()"
        />

        <!-- Router outlet: each feature renders here -->
        <main class="flex-1 overflow-y-auto p-6">
          <router-outlet />
        </main>
      </div>
    </div>
