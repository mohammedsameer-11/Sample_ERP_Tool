<aside class="fixed top-0 left-0 h-full bg-slate-900 text-white
             transition-all duration-300 z-40 flex flex-col overflow-hidden" [class.w-64]="!collapsed()"
    [class.w-16]="collapsed()">
    <!-- Logo area -->
    <div class="flex items-center h-16 px-4 border-b border-slate-700 shrink-0">
        <div class="flex items-center justify-center w-8 h-8 bg-indigo-600 rounded-lg shrink-0">
            <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
            </svg>
        </div>
        <!-- Label hidden when collapsed: overflow-hidden on parent clips it -->
        @if (!collapsed()) {
        <span class="ml-3 font-semibold text-lg tracking-tight whitespace-nowrap">
            ERP Portal
        </span>
        }
    </div>

    <!-- Navigation links -->
    <nav class="flex-1 py-4 space-y-1 px-2">
        @for (item of navItems; track item.route) {
        <a [routerLink]="item.route" routerLinkActive="bg-slate-800 text-indigo-400"
            [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }" class="flex items-center gap-3 px-3 py-2.5 rounded-lg
                   text-slate-400 hover:bg-slate-800 hover:text-white
                   transition-colors duration-150 group" [title]="collapsed() ? item.label : ''">
            <!-- SVG icon using path data from navItems -->
            <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="item.icon" />
            </svg>
            @if (!collapsed()) {
            <span class="text-sm font-medium whitespace-nowrap">{{ item.label }}</span>
            }
        </a>
        }
    </nav>

    <!-- Collapse toggle button at bottom -->
    <div class="p-2 border-t border-slate-700 shrink-0">
        <button (click)="toggleCollapse.emit()" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg
                 text-slate-400 hover:bg-slate-800 hover:text-white transition-colors"
            [attr.aria-label]="collapsed() ? 'Expand sidebar' : 'Collapse sidebar'">
            <!-- Chevron rotates to indicate direction -->
            <svg class="w-5 h-5 shrink-0 transition-transform duration-300" [class.rotate-180]="collapsed()" fill="none"
                viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
            </svg>
            @if (!collapsed()) {
            <span class="text-sm font-medium">Collapse</span>
            }
        </button>
    </div>
</aside>
